name: SpringBoot React CI/CD
on:
  push:
    branches:
      - master

jobs:
  build-backend:
    name: Build Spring Boot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Backend Repository
        uses: actions/checkout@v4
        with:
          repository: MuzPayroll/MuzPayroll        # ✅ explicit repo

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven

      - name: Build Backend
        run: mvn clean install -DskipTests         # ✅ no working-directory needed

      - name: Run Backend Tests
        run: mvn test

  build-frontend:
    name: Build React
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Frontend Repository
        uses: actions/checkout@v4
        with:
          repository: MuzPayroll/MuzPayrollReact   # ✅ explicit repo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: node_modules                       # ✅ root level, no subfolder
          key: node-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        run: npm install

      - name: Run Frontend Tests
        run: npm test -- --watchAll=false

      - name: Build React App
        run: npm run build

  docker-build:
    name: Build & Push Docker Images
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: MuzPayroll/MuzPayroll
          token: ${{ secrets.GH_PAT }}
          path: backend                            # ✅ checkout into named folder

      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: MuzPayroll/MuzPayrollReact
          token: ${{ secrets.GH_PAT }}
          path: frontend                           # ✅ checkout into named folder

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springboot-backend:latest ./backend

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/springboot-backend:latest

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest ./frontend

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest

  deploy:
    name: Deploy to Server
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            docker pull ${{ secrets.DOCKER_USERNAME }}/springboot-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest
            docker compose down
            docker compose up -d
