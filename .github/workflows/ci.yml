name: SpringBoot React CI/CD

on:
  push:
    branches:
      - master

jobs:

  build-backend:
    name: Build Spring Boot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: maven

      - name: Build Backend
        working-directory: backend
        run: mvn clean install -DskipTests

      - name: Run Backend Tests
        working-directory: backend
        run: mvn test


  build-frontend:
    name: Build React
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: node-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Dependencies
        working-directory: frontend
        run: npm install

      - name: Run Frontend Tests
        working-directory: frontend
        run: npm test -- --watchAll=false

      - name: Build React App
        working-directory: frontend
        run: npm run build


  docker-build:
    name: Build & Push Docker Images
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springboot-backend:latest ./backend

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/springboot-backend:latest

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest ./frontend

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest


  deploy:
    name: Deploy to Server
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/app

            docker pull ${{ secrets.DOCKER_USERNAME }}/springboot-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest

            docker compose down
            docker compose up -d
